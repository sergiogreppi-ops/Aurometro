<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurometro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: transparent; display:flex; align-items:center; justify-content:center; min-height:100vh; }
  .widget {
    background: rgba(10,10,15,0.92);
    border: 1px solid #222; border-radius: 16px;
    padding: 10px 18px 14px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 30px rgba(0,0,0,0.5);
  }
  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.35em;
    color: #888; text-transform: uppercase;
  }
  .row { display:flex; align-items:center; gap:14px; }
  .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.8rem; line-height:1;
    min-width: 52px; text-align:center;
    transition: transform 0.12s;
  }
  .num.laura { color:#00cfff; text-shadow:0 0 18px #00cfff99; }
  .num.aura  { color:#ff2244; text-shadow:0 0 18px #ff224499; }
  .num.pop   { transform: scale(1.35); }
  .bar-wrap { display:flex; flex-direction:column; gap:5px; }
  .bar-track {
    width:220px; height:18px;
    background:#1a1a24; border-radius:9px;
    overflow:hidden; position:relative; border:1px solid #222;
  }
  .bar-l {
    position:absolute; left:0; top:0; bottom:0; border-radius:9px;
    background:linear-gradient(90deg,#006699,#00cfff);
    box-shadow:0 0 12px #00cfff66;
    transition:width 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .bar-r {
    position:absolute; right:0; top:0; bottom:0; border-radius:9px;
    background:linear-gradient(270deg,#990022,#ff2244);
    box-shadow:0 0 12px #ff224466;
    transition:width 0.45s cubic-bezier(0.34,1.56,0.64,1);
  }
  .bar-mid { position:absolute; left:50%; top:0; bottom:0; width:2px; background:#fff; transform:translateX(-50%); opacity:0.2; }
  .pct-row { display:flex; justify-content:space-between; font-family:'Bebas Neue',sans-serif; font-size:0.7rem; letter-spacing:0.08em; }
  .pct-row .l { color:#00cfff; opacity:0.6; }
  .pct-row .r { color:#ff2244; opacity:0.6; }
  .btn-reset {
    background:none; border:1px solid #2a2a3a; border-radius:8px;
    color:#aaa; font-size:1rem; width:30px; height:30px;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all 0.2s; flex-shrink:0;
  }
  .btn-reset:hover { color:#ff4455; border-color:#ff2244; background:rgba(255,34,68,0.08); }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; background:#333; }
  .dot.on   { background:#00ff88; box-shadow:0 0 6px #00ff88; animation:p 2s infinite; }
  .dot.err  { background:#ff3333; }
  .dot.wait { background:#ffaa00; animation:p 1s infinite; }
  @keyframes p { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .flash { position:fixed; inset:0; pointer-events:none; opacity:0; transition:opacity 0.1s; z-index:50; }
  .flash.af { background:radial-gradient(ellipse at right,rgba(255,34,68,0.2) 0%,transparent 60%); }
  .flash.lf { background:radial-gradient(ellipse at left,rgba(0,207,255,0.16) 0%,transparent 60%); }
  .flash.show { opacity:1; }
</style>
</head>
<body>
<div class="flash af" id="fA"></div>
<div class="flash lf" id="fL"></div>
<div class="widget">
  <div class="title">Aurometro</div>
  <div class="row">
    <div class="dot wait" id="dot"></div>
    <div class="num laura" id="nL">0</div>
    <div class="bar-wrap">
      <div class="bar-track">
        <div class="bar-l" id="bL" style="width:50%"></div>
        <div class="bar-r" id="bR" style="width:50%"></div>
        <div class="bar-mid"></div>
      </div>
      <div class="pct-row">
        <span class="l" id="pL">50%</span>
        <span class="r" id="pR">50%</span>
      </div>
    </div>
    <div class="num aura" id="nA">0</div>
    <button class="btn-reset" onclick="reset()" title="Reiniciar">⟳</button>
  </div>
</div>
<script>
const SERVER = 'wss://aurometro-production.up.railway.app';
let aura = 0, laura = 0, ws = null;
const $ = id => document.getElementById(id);
function ui() {
  $('nA').textContent = aura; $('nL').textContent = laura;
  const t = aura + laura, pA = t ? Math.round(aura/t*100) : 50, pL = t ? 100-pA : 50;
  $('bR').style.width = pA+'%'; $('bL').style.width = pL+'%';
  $('pR').textContent = pA+'%'; $('pL').textContent = pL+'%';
}
function pop(id) { const e=$(id); e.classList.add('pop'); setTimeout(()=>e.classList.remove('pop'),160); }
function flash(t) { const e=$(t==='aura'?'fA':'fL'); e.classList.add('show'); setTimeout(()=>e.classList.remove('show'),200); }
function vote(t) { if(t==='aura'){aura++;pop('nA');flash('aura');}else{laura++;pop('nL');flash('laura');} ui(); }
function reset() { aura=0; laura=0; ui(); }
function setDot(s) { $('dot').className='dot '+s; }
function connect() {
  if(ws){try{ws.close();}catch(e){}}
  setDot('wait');
  ws = new WebSocket(SERVER);
  ws.onopen    = ()=>setDot('on');
  ws.onclose   = ()=>{ setDot('err'); setTimeout(connect,4000); };
  ws.onerror   = ()=>setDot('err');
  ws.onmessage = (e)=>{ try{ const d=JSON.parse(e.data); if(d.type==='aura'||d.type==='laura') vote(d.type); }catch(err){} };
}
ui(); connect();
</script>
</body>
</html>
